<h1>💬 Conversation avec {{ other_user['username'] }}</h1>
<a href="/conversations">⬅ Retour</a>
<hr>

<div class="chat-box">
{% for msg in msgs %}
<p class="{% if msg['sender_id'] == session.user_id %}sent{% else %}received{% endif %}">
    <b>{{ msg['sender_name'] }}</b>: {{ msg['content'] }}
    <i style="font-size:0.8em;">{{ msg['date'] }}</i>
</p>
{% endfor %}
</div>

<form method="post" class="chat-form">
    <input type="text" name="content" placeholder="Écrire un message..." required style="width:70%">
    <button>Envoyer</button>
</form>
